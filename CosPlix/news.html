<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News & Social – CosPlix</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { display: ['Dela Gothic One', 'cursive'], body: ['Outfit', 'sans-serif'] } } } }
  </script>
  
  <style>
    html { background: #050510; scroll-behavior: smooth; }
    body { 
      margin: 0; 
      background: radial-gradient(circle at 50% 50%, #0d0d2b 0%, #050510 100%) !important; 
      color: #e8e8f0; 
      overflow-x: hidden; 
    } 
    
    #particles-js { 
      position: fixed; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      z-index: 1; 
      pointer-events: none; 
      opacity: 0.8; 
    }

    .bg-blob {
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(131,56,236,0.08) 0%, transparent 70%);
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
      animation: drift 25s infinite alternate ease-in-out;
    }

    @keyframes drift {
      from { transform: translate(-20%, -20%) scale(1); }
      to { transform: translate(40%, 30%) scale(1.2); }
    }

    .main-content { position: relative; z-index: 10; }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .glass-card:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: #ff006e;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(255, 0, 110, 0.2);
      transform: translateY(-8px);
    }

    .gradient-text {
      background: linear-gradient(to right, #ff006e, #8338ec, #3a86ff, #ff006e);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: shine 4s linear infinite;
    }
    @keyframes shine { to { background-position: 200% center; } }

    /* Navigation Styling matched to rest of site */
    .nav-link { 
      font-size: 13px; 
      font-weight: 700; 
      letter-spacing: -0.01em; 
      color: #ffffff; 
      opacity: 0.8; 
      position: relative; 
      transition: all 0.2s;
      text-decoration: none;
    }
    .nav-link:hover { opacity: 1; }
    
    .nav-link::after { 
      content:''; 
      position:absolute; 
      bottom: -6px; 
      left: 0; 
      width: 0; 
      height: 3px; 
      background: #ff006e; 
      transition: width 0.3s; 
    }
    
    .nav-link.active { 
      opacity: 1; 
      color: #ff006e; 
    }
    
    .nav-link.active::after { 
      width: 100%; 
      background: #ff006e; 
    }

    
    .feed-btn { position: relative; overflow: hidden; transition: 0.4s; }
    .feed-btn.active-tab { background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px currentColor; border-color: currentColor; }
    
    .social-feed { display: none; }
    .social-feed.active { display: block; animation: slideIn 0.5s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .mobile-menu { transform: translateX(-100%); transition: transform 0.3s ease; background: #050510; z-index: 100; }
    .mobile-menu.open { transform: translateX(0); }

    .pulse-text {
      font-family: 'Dela Gothic One', cursive;
      text-transform: uppercase;
      font-style: italic;
      line-height: 1;
    }
  </style>
</head>
<body class="font-body">

  <div class="bg-blob" style="top: -10%; left: -5%;"></div>
  <div class="bg-blob" style="bottom: -10%; right: -5%; background: radial-gradient(circle, rgba(255,0,110,0.05) 0%, transparent 70%);"></div>

  <div id="particles-js"></div>

  <div class="main-content">
    <nav id="main-nav" class="fixed top-0 left-0 w-full z-50 border-b border-white/5 bg-black/60 backdrop-blur-xl">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-3 group">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[#ff006e] to-[#8338ec] flex items-center justify-center text-xl shadow-[0_0_20px_rgba(255,0,110,0.4)] group-hover:rotate-12 transition-transform">⚡</div>
          <span class="font-display text-xl tracking-tighter gradient-text">CosPlix</span>
        </a>
        <div class="hidden lg:flex items-center gap-7">
          <a href="index.html" class="nav-link">Home</a>
          <a href="news.html" class="nav-link active">News</a>
          <a href="gallery.html" class="nav-link">Gallery</a>
          <a href="events.html" class="nav-link">Events</a>
          <a href="tutorials.html" class="nav-link">Tutorials</a>
          <a href="community.html" class="nav-link">Community</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="contact.html" class="nav-link">Support</a>   <!-- fixed: was support.html -->
        </div>
        <button class="lg:hidden p-2" onclick="toggleMobile()"><i data-lucide="menu" style="color:#ff006e;"></i></button>
      </div>
    </nav>

    <div id="mobile-menu" class="mobile-menu fixed inset-0 z-[60] flex flex-col gap-1 p-6 pt-24">
      <button class="absolute top-6 right-6 p-2" onclick="toggleMobile()"><i data-lucide="x" style="color:#ff006e;"></i></button>
      <a href="index.html" class="text-lg font-semibold py-3 px-4 rounded-lg hover:bg-white/5">🏠 Home</a>
      <a href="news.html" class="text-lg font-semibold py-3 px-4 rounded-lg bg-white/5 text-[#ff006e]">📰 News</a>
      <a href="gallery.html" class="text-lg font-semibold py-3 px-4 rounded-lg hover:bg-white/5">📸 Gallery</a>
      <a href="events.html" class="text-lg font-semibold py-3 px-4 rounded-lg hover:bg-white/5">🗓️ Events</a>
      <a href="tutorials.html" class="text-lg font-semibold py-3 px-4 rounded-lg hover:bg-white/5">✂️ Tutorials</a>
      <a href="community.html" class="text-lg font-semibold py-3 px-4 rounded-lg hover:bg-white/5">💬 Community</a>
      <a href="about.html" class="text-lg font-semibold py-3 px-4 rounded-lg hover:bg-white/5">👥 About</a>
      <a href="contact.html" class="text-lg font-semibold py-3 px-4 rounded-lg hover:bg-white/5">🎧 Support</a>
    </div>

    <main class="pt-32 pb-20 max-w-6xl mx-auto px-6">
      <div class="relative mb-16 text-center">
        <h1 class="pulse-text text-5xl md:text-7xl mb-4 tracking-tight">Currently <span class="gradient-text">Trending</span></h1>
        <p class="text-gray-400 max-w-md mx-auto text-[10px] font-black tracking-[0.3em] uppercase opacity-70">Live Data Stream // Official Updates</p>
      </div>

      <section class="mb-24">
        <div id="api-news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="col-span-full flex flex-col items-center py-20">
            <div class="relative w-16 h-16">
              <div class="absolute inset-0 border-2 border-[#ff006e]/20 rounded-full"></div>
              <div class="absolute inset-0 border-t-2 border-[#ff006e] rounded-full animate-spin"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="relative">
        <div class="text-center mb-12">
          <h2 class="font-display text-3xl mb-8">News <span style="color:#3a86ff;">Channels</span></h2>
          <div class="flex flex-wrap justify-center gap-3 mb-10">
            <button class="feed-btn active-tab px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase border border-white/5" id="btn-ann" onclick="switchFeed('ann')" style="color:#3a86ff;">📘 ANN News</button>
            <button class="feed-btn px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase border border-white/5" id="btn-crunchyroll" onclick="switchFeed('crunchyroll')" style="color:#fb5607;">🟧 Crunchyroll</button>
            <button class="feed-btn px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase border border-white/5" id="btn-ufotable" onclick="switchFeed('ufotable')" style="color:#ff006e;">🌸 Ufotable</button>
            <button class="feed-btn px-6 py-3 rounded-2xl text-[10px] font-black tracking-widest uppercase border border-white/5" id="btn-comicfiesta" onclick="switchFeed('comicfiesta')" style="color:#06d6a0;">🎪 Comic Fiesta</button>
          </div>
        </div>

        <div class="max-w-xl mx-auto p-1 rounded-[2.8rem] bg-gradient-to-b from-white/20 to-transparent shadow-2xl">
          <div class="rounded-[2.4rem] overflow-hidden bg-white" style="height: 600px;">
            <div id="feed-ann" class="social-feed active h-full">
              <iframe src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fanimenewsnetwork&tabs=timeline&width=500&height=600&small_header=true" width="100%" height="100%" style="border:none;" scrolling="no"></iframe>
            </div>
            <div id="feed-crunchyroll" class="social-feed h-full">
              <iframe src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2FCrunchyroll&tabs=timeline&width=500&height=600&small_header=true" width="100%" height="100%" style="border:none;" scrolling="no"></iframe>
            </div>
            <div id="feed-ufotable" class="social-feed h-full">
              <iframe src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fufotable&tabs=timeline&width=500&height=600&small_header=true" width="100%" height="100%" style="border:none;" scrolling="no"></iframe>
            </div>
            <div id="feed-comicfiesta" class="social-feed h-full">
              <iframe src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2Fcomicfiesta&tabs=timeline&width=500&height=600&small_header=true" width="100%" height="100%" style="border:none;" scrolling="no"></iframe>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="w-full py-8 text-center mt-auto" style="background:rgba(255,255,255,0.02); border-top:1px solid rgba(255,255,255,0.05);">
      <div class="font-display text-lg mb-2 gradient-text">CosPlix</div>
      <p class="text-xs" style="color:#606080;">© 2026 CosPlix. Made with 💜</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    function toggleMobile() { 
      document.getElementById('mobile-menu').classList.toggle('open'); 
    }

    function switchFeed(id) {
      $('.social-feed').removeClass('active');
      $('.feed-btn').removeClass('active-tab');
      $(`#feed-${id}`).addClass('active');
      $(`#btn-${id}`).addClass('active-tab');
    }

    $(document).ready(function() {
      // Initialize Lucide icons for menu button, close button, etc.
      if (typeof lucide !== 'undefined') {
        lucide.createIcons();
      }

      const query = `query { Page(perPage: 6) { media(sort: TRENDING_DESC, type: ANIME) { title { english native } description averageScore coverImage { large } siteUrl } } }`;
      
      $.ajax({
        url: 'https://graphql.anilist.co',
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        data: JSON.stringify({ query: query }),
        success: function(res) {
          const data = res.data.Page.media;
          let html = '';
          data.forEach((anime, i) => {
            const desc = anime.description ? anime.description.replace(/<[^>]*>?/gm, '').substring(0, 80) : "Latest news available on site.";
            html += `
              <a href="${anime.siteUrl}" target="_blank" class="glass-card rounded-[2.5rem] p-6 flex flex-col group anim-slide-up" style="animation-delay:${i*0.1}s">
                <div class="h-56 rounded-[1.8rem] overflow-hidden mb-6 relative">
                  <img src="${anime.coverImage.large}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                  <div class="absolute top-4 right-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black text-[#06d6a0] border border-[#06d6a0]/30">⭐ ${anime.averageScore}%</div>
                </div>
                <h3 class="font-display text-white text-lg mb-2 line-clamp-1">${anime.title.english || anime.title.native}</h3>
                <p class="text-xs text-gray-400 leading-relaxed line-clamp-2 mb-4">${desc}...</p>
                <div class="mt-auto text-[10px] font-black uppercase tracking-widest text-[#8338ec]">Read Feed —</div>
              </a>`;
          });
          $('#api-news-grid').html(html);
        }
      });

      particlesJS("particles-js", {
        "particles": {
          "number": { "value": 110, "density": { "enable": true, "value_area": 800 } },
          "color": { "value": ["#ff006e", "#8338ec", "#3a86ff"] },
          "shape": { "type": "circle" },
          "opacity": { "value": 0.6, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
          "size": { "value": 3, "random": true, "anim": { "enable": true, "speed": 4, "size_min": 0.3, "sync": false } },
          "line_linked": { "enable": true, "distance": 150, "color": "#8338ec", "opacity": 0.2, "width": 1 },
          "move": { "enable": true, "speed": 2.5, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
        },
        "interactivity": {
          "detect_on": "canvas",
          "events": { 
            "onhover": { "enable": true, "mode": "bubble" }, 
            "onclick": { "enable": true, "mode": "push" }, 
            "resize": true 
          },
          "modes": { 
            "bubble": { "distance": 200, "size": 6, "duration": 2, "opacity": 0.8, "speed": 3 },
            "push": { "particles_nb": 4 }
          }
        },
        "retina_detect": true
      });
    });
  </script>
</body>
</html>
